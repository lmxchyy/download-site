version: '3.8'

services:
  web:
    build: .
    ports:
      - "8080:80"
    volumes:
      - .:/var/www/html
    depends_on:
      - db
    environment:
      - DB_HOST=db
      - DB_NAME=download_db
      - DB_USER=root
      - DB_PASS=rootpassword

  db:
    image: mysql:8.0
    ports:
      - "3307:3306"
    environment:
      - MYSQL_ROOT_PASSWORD=rootpassword
      - MYSQL_DATABASE=download_db
    volumes:
      - db_data:/var/lib/mysql
      - ./install.sql:/docker-entrypoint-initdb.d/install.sql

volumes:
  db_data:
